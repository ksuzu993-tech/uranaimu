<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>診断中 ― 命星診断AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;800&family=Zen+Kaku+Gothic+New:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FAF8F1;
    --paper-2:#F2EFE4;
    --ink:#1B1E2E;
    --ink-soft:#5B5E70;
    --ink-faint:#8B8D9C;
    --line:rgba(27,30,46,0.14);
    --red:#B23A2E;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Zen Kaku Gothic New', sans-serif;
  }
  header{
    display:flex;align-items:center;justify-content:space-between;
    padding:18px 28px;border-bottom:1px solid var(--line);
    background:rgba(250,248,241,.95);
  }
  .brand{font-family:'Shippori Mincho',serif;font-size:17px;letter-spacing:.05em;}
  .brand .mark{color:var(--red);}
  .back{
    font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink-soft);
    text-decoration:none;letter-spacing:.04em;
  }
  .back:hover{color:var(--ink);}
  .plan-tag{
    font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.08em;
    color:var(--red);border:1px solid rgba(178,58,46,.35);padding:5px 12px;
    display:inline-block;margin:18px 28px 0;
  }
  .frame-wrap{
    max-width:720px;margin:20px auto 40px;padding:0 20px;
  }
  .frame-card{
    border:1px solid var(--line);
    background:var(--paper-2);
    height:78vh;
    min-height:520px;
    overflow:hidden;
    position:relative;
  }
  iframe{width:100%;height:100%;border:none;display:block;}
  .fallback{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    flex-direction:column;gap:14px;color:var(--ink-soft);font-size:13.5px;text-align:center;padding:20px;
  }
  .fallback a{color:var(--red);}
  footer{text-align:center;padding:30px 0;font-size:12px;color:var(--ink-faint);}
</style>
</head>
<body>

<header>
  <div class="brand">命星診断<span class="mark">AI</span></div>
  <a class="back" href="./">← トップに戻る</a>
</header>

<span class="plan-tag" id="planTag">診断モード確認中…</span>

<div class="frame-wrap">
  <div class="frame-card" style="display:flex;align-items:center;justify-content:center;">
    <div style="text-align:center;padding:40px;">
      <svg width="64" height="64" viewBox="0 0 64 64" style="margin:0 auto 24px;">
        <rect x="6" y="6" width="52" height="52" fill="none" stroke="#B23A2E" stroke-width="2"/>
        <rect x="14" y="14" width="36" height="36" fill="none" stroke="#B23A2E" stroke-width="1"/>
        <text x="32" y="26" font-family="'Shippori Mincho',serif" font-size="14" fill="#B23A2E" text-anchor="middle">命星</text>
        <text x="32" y="44" font-family="'Shippori Mincho',serif" font-size="14" fill="#B23A2E" text-anchor="middle">診断</text>
      </svg>
      <p id="statusText" style="font-size:14.5px;color:var(--ink-soft);margin-bottom:28px;">診断ページへご案内しています…</p>
      <a id="fallbackLink" href="#" class="back" style="border:1px solid var(--line);padding:12px 26px;display:inline-block;">移動しない場合はこちら →</a>
    </div>
  </div>
</div>

<footer>© 2026 命星診断AI</footer>

<script>
  // URLの ?plan=free / ?plan=single / ?plan=monthly で出しわけ
  const apps = {
    free:    { url: "https://udify.app/chat/cOXUDSaamu1uiJKY", label: "無料お試し診断へご案内しています…" },
    single:  { url: "https://udify.app/chat/2nFYfP0lXYC6vx6r", label: "都度診断へご案内しています…(ご購入ありがとうございます)" },
    monthly: { url: "https://udify.app/chat/2nFYfP0lXYC6vx6r", label: "月額診断へご案内しています…(ご登録ありがとうございます)" }
  };
  const params = new URLSearchParams(window.location.search);
  const plan = apps[params.get("plan")] ? params.get("plan") : "free";
  const app = apps[plan];

  document.getElementById("planTag").textContent = app.label.replace(/へご案内しています….*/, "");
  document.getElementById("statusText").textContent = app.label;
  document.getElementById("fallbackLink").href = app.url;

  setTimeout(function(){ window.location.href = app.url; }, 1200);
</script>

</body>
</html>
